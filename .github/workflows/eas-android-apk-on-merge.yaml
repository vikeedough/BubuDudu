name: EAS Android APK (merge to main) + Telegram

on:
    push:
        branches: [main]

jobs:
    build-android-apk:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: read

        steps:
            - name: Find merged PR for this commit + check build-apk label
              id: prcheck
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  REPO: ${{ github.repository }}
                  SHA: ${{ github.sha }}
              run: |
                  set -e

                  # Find PRs associated with this commit (GitHub REST API)
                  PRS_JSON="$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/${REPO}/commits/${SHA}/pulls")"

                  PR_NUMBER="$(echo "${PRS_JSON}" | node -e "
                    const fs=require('fs');
                    const input=fs.readFileSync(0,'utf8');
                    const prs=JSON.parse(input||'[]');
                    // Prefer merged PRs targeting main
                    const pr=prs.find(p => p.merged_at && p.base && p.base.ref==='main') || prs[0];
                    if (!pr) process.exit(2);
                    process.stdout.write(String(pr.number));
                  ")"

                  echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

                  # Fetch PR details to get labels
                  PR_JSON="$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/${REPO}/pulls/${PR_NUMBER}")"

                  HAS_LABEL="$(echo "${PR_JSON}" | node -e "
                    const fs=require('fs');
                    const pr=JSON.parse(fs.readFileSync(0,'utf8'));
                    const labels=(pr.labels||[]).map(l=>l.name);
                    process.stdout.write(labels.includes('build-apk') ? 'true' : 'false');
                  ")"

                  echo "has_label=${HAS_LABEL}" >> "$GITHUB_OUTPUT"

            - name: Stop if no build-apk label
              if: ${{ steps.prcheck.outputs.has_label != 'true' }}
              run: |
                  echo "No build-apk label on the merged PR for this commit. Skipping."
                  exit 0

            - name: Send Telegram (Build Started)
              if: ${{ steps.prcheck.outputs.has_label == 'true' }}
              env:
                  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
                  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
                  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
              run: |
                  curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                    -d "chat_id=${TELEGRAM_CHAT_ID}" \
                    --data-urlencode "text=BubuDudu Android APK build started. GitHub Actions run: ${RUN_URL}"

            - name: Checkout
              if: ${{ steps.prcheck.outputs.has_label == 'true' }}
              uses: actions/checkout@v4

            - name: Setup Node
              if: ${{ steps.prcheck.outputs.has_label == 'true' }}
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              if: ${{ steps.prcheck.outputs.has_label == 'true' }}
              run: npm ci

            - name: Setup EAS
              if: ${{ steps.prcheck.outputs.has_label == 'true' }}
              uses: expo/expo-github-action@v8
              with:
                  eas-version: latest
                  token: ${{ secrets.EXPO_TOKEN }}

            - name: Remove native folders (force managed prebuild)
              if: ${{ steps.prcheck.outputs.has_label == 'true' }}
              run: rm -rf android ios

            - name: Trigger EAS build (Android APK) and wait
              if: ${{ steps.prcheck.outputs.has_label == 'true' }}
              run: |
                  eas build -p android --profile preview --non-interactive --wait --json > eas-build.json

            - name: Resolve artifact URL via eas build:view
              if: ${{ steps.prcheck.outputs.has_label == 'true' }}
              id: resolve
              run: |
                  node - <<'NODE'
                  const fs = require('fs');
                  const { execSync } = require('child_process');

                  const raw = fs.readFileSync('eas-build.json', 'utf8').trim();
                  const data = JSON.parse(raw);
                  const build = Array.isArray(data) ? data[0] : (data?.build ?? data);
                  const buildId = build?.id;

                  if (!buildId) process.exit(1);

                  const viewRaw = execSync(`eas build:view ${buildId} --json`, { stdio: ['ignore','pipe','pipe'] }).toString();
                  const view = JSON.parse(viewRaw);

                  const url =
                    view?.artifacts?.buildUrl ||
                    view?.artifacts?.applicationArchiveUrl ||
                    view?.buildUrl ||
                    view?.url;

                  if (!url) process.exit(1);

                  fs.appendFileSync(process.env.GITHUB_OUTPUT, `url=${url}\n`);
                  NODE

            - name: Send Telegram (Build Success)
              if: ${{ steps.prcheck.outputs.has_label == 'true' && success() }}
              env:
                  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
                  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
                  BUILD_URL: ${{ steps.resolve.outputs.url }}
              run: |
                  curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                    -d "chat_id=${TELEGRAM_CHAT_ID}" \
                    --data-urlencode "text=APK build finished successfully: ${BUILD_URL}"

            - name: Send Telegram (Build Failed)
              if: ${{ steps.prcheck.outputs.has_label == 'true' && always() && failure() }}
              env:
                  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
                  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
              run: |
                  curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                    -d "chat_id=${TELEGRAM_CHAT_ID}" \
                    --data-urlencode "text=APK build FAILED. Check GitHub Actions logs."
